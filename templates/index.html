<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Upload Call</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">
  <div class="max-w-3xl mx-auto p-6">

    <div class="bg-white rounded-2xl shadow p-6">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold">Upload Call Recording</h1>
        <a href="/dashboard" class="text-blue-600 font-medium hover:underline">Dashboard</a>
      </div>

      <p class="text-gray-600 mt-2">
        Upload an audio/video call file and add lead details. (AI features will come next)
      </p>

      <form action="/upload" method="post" enctype="multipart/form-data" class="mt-6 space-y-5">

        <div>
          <label class="block text-sm font-medium text-gray-700">Call file</label>
          <input type="file" name="audio" required
                 class="mt-2 block w-full text-sm file:mr-4 file:py-2 file:px-4
                        file:rounded-lg file:border-0 file:bg-blue-600 file:text-white
                        hover:file:bg-blue-700
                        rounded-lg border border-gray-300 bg-white p-2"/>
          <p class="text-xs text-gray-500 mt-1">Supported: mp3, wav, m4a, mp4</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Lead name</label>
            <input name="name" placeholder="Rahim"
                   class="mt-2 w-full rounded-lg border border-gray-300 p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700">Phone</label>
            <input name="phone" placeholder="01XXXXXXXXX"
                   class="mt-2 w-full rounded-lg border border-gray-300 p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Product / Service</label>
            <input name="product" placeholder="IELTS / Admission / Property"
                   class="mt-2 w-full rounded-lg border border-gray-300 p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700">Source</label>
            <select name="source"
                    class="mt-2 w-full rounded-lg border border-gray-300 p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="call">Call</option>
              <option value="facebook">Facebook</option>
              <option value="whatsapp">WhatsApp</option>
              <option value="referral">Referral</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Budget (optional)</label>
            <input name="budget" placeholder="8000-12000"
                   class="mt-2 w-full rounded-lg border border-gray-300 p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700">Timeline (optional)</label>
            <input name="timeline" placeholder="7 days / next month"
                   class="mt-2 w-full rounded-lg border border-gray-300 p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700">
          Upload & Save Lead
        </button>

      </form>
    </div>

    <div class="text-xs text-gray-500 mt-4">
      Tip: Use short recordings (10–60 sec) for faster testing.
    </div>

  </div>
</body>
</html>
